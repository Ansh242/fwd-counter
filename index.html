<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Counter</h1>
        <h2 id="count">0</h2>
        <p id="status">Zero</p>
        
        <input type="number" id="step" value="1" placeholder="Step">
        
        <div class="row">
            <button id="dec">Decrement</button>
            <button id="res">Reset</button>
            <button id="inc">Increment</button>
        </div>
        
        <div class="row">
            <button id="dec5">-5</button>
            <button id="inc5">+5</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
